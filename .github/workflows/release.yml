name: 🚀 Release Binaries

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create_release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: vmix ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true

  build:
    name: Build for ${{ matrix.os }}
    needs: create_release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        include:
          - os: windows-latest
            asset_name: vmix-windows-amd64.exe
          - os: ubuntu-latest
            asset_name: vmix-linux-amd64
          - os: macos-latest
            asset_name: vmix-macos-universal

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller psutil
          if [ "${{ runner.os }}" == "Windows" ]; then
            pip install pycaw comtypes
          fi
        shell: bash

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile vmix.py --name vmix
        shell: bash

      - name: Prepare Binary
        run: |
          if [ "${{ runner.os }}" == "Windows" ]; then
            mv dist/vmix.exe dist/${{ matrix.asset_name }}
          else
            mv dist/vmix dist/${{ matrix.asset_name }}
          fi
        shell: bash

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        with:
          files: dist/${{ matrix.asset_name }}
          tag_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Skip fail for race condition on tag creation if any, though handled by needs: create_release
