name: 🚀 Release Binaries

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        include:
          - os: windows-latest
            artifact_name: vmix-win64.exe
            asset_name: vmix-windows-amd64.exe
          - os: ubuntu-latest
            artifact_name: dist/vmix
            asset_name: vmix-linux-amd64
          - os: macos-latest
            artifact_name: dist/vmix
            asset_name: vmix-macos-universal

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller psutil
          if [ "${{ runner.os }}" == "Windows" ]; then
            pip install pycaw comtypes
          fi
        shell: bash

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile vmix.py --name vmix
        shell: bash

      - name: Rename Artifact (Windows)
        if: runner.os == 'Windows'
        run: mv dist/vmix.exe dist/${{ matrix.artifact_name }}
        shell: bash

      - name: Upload binaries to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ${{ matrix.artifact_name }}
          asset_name: ${{ matrix.asset_name }}
          tag: ${{ github.ref }}
          overwrite: true
